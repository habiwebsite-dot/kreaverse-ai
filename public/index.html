<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kreaverse AI</title>
    <style>
        :root {
            --bg: #0B0E14;
            --surface: #1A1D24;
            --neon-blue: #3182CE;
            --neon-magenta: #D53F8C;
            --text: #E2E8F0;
            --text-secondary: #A0AEC0;
            --border: #2D3748;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        a { color: var(--neon-blue); text-decoration: none; }
        .navbar {
            position: sticky; top:0; z-index:100;
            backdrop-filter: blur(10px);
            background: rgba(11,14,20,0.9);
            border-bottom: 1px solid var(--border);
            padding: 1rem;
        }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin:0 auto; }
        .logo { font-weight: 700; font-size: 1.5rem; color: var(--neon-blue); }
        .nav-links { display: flex; gap: 1.5rem; }
        .nav-links a { color: var(--text); font-weight: 500; }
        .hamburger { display: none; background: none; border: none; color: var(--text); font-size: 1.8rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
        .btn {
            display: inline-block; padding: 0.8rem 2rem; border-radius: 0.5rem;
            font-weight: 600; cursor: pointer; border: none; transition: 0.3s;
        }
        .btn-primary { background: var(--neon-blue); color: white; }
        .btn-primary:hover { background: var(--neon-magenta); }
        .btn-outline { border: 2px solid var(--neon-blue); color: var(--neon-blue); background: transparent; }
        .card {
            background: var(--surface); border-radius: 1rem; padding: 2rem;
            border: 1px solid var(--border);
        }
        .grid { display: grid; gap: 1.5rem; }
        .grid-2 { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
        .grid-3 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
        .grid-4 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; color: var(--text-secondary); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 0.8rem; border-radius: 0.5rem;
            border: 1px solid var(--border); background: var(--bg); color: var(--text);
        }
        .hero { text-align: center; padding: 4rem 1rem; }
        .footer { text-align: center; padding: 2rem; color: var(--text-secondary); border-top: 1px solid var(--border); margin-top: 2rem; }
        @media (max-width: 768px) {
            .nav-links { display: none; flex-direction: column; position: fixed; top: 60px; left: 0; width: 100%; background: var(--surface); padding: 1rem; }
            .nav-links.active { display: flex; }
            .hamburger { display: block; }
        }
        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 1rem; font-size: 0.75rem; font-weight: 600; }
        .badge-success { background: #38A169; color: white; }
        .badge-danger { background: #E53E3E; color: white; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 1rem; }
    </style>
</head>
<body>
    <div id="promoBanner" class="promo-banner" style="background: var(--neon-magenta); color: white; text-align: center; padding: 0.5rem; display: none;"></div>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#/" class="logo">Kreaverse AI</a>
            <div class="nav-links" id="navLinks">
                <a href="#/">Beranda</a>
                <a href="#/tools">Tool Model</a>
                <a href="#/layanan">Layanan</a>
                <a href="#/tentang">Tentang</a>
                <span id="authArea"></span>
            </div>
            <button class="hamburger" id="hamburger">☰</button>
        </div>
    </nav>
    <main id="mainContent"></main>
    <footer class="footer">&copy; 2026 Kreaverse AI by HABI STUDIO</footer>

    <script>
        // Error handling
        window.onerror = function(msg, url, line) {
            alert('JS Error: ' + msg + ' at line ' + line);
        };

        // ========== DATA ==========
        const PROVIDER_DATA = {
            'kie-ai': { name: 'Kie AI', models: ['seedream','flux','kling'], types: { seedream:'image', flux:'image', kling:'video' } },
            'api-box': { name: 'API Box', models: ['default'], types: { default:'image' } },
            'apiframe': { name: 'Apiframe.ai', models: ['default'], types: { default:'image' } },
            'crun': { name: 'Crun.ai', models: ['default'], types: { default:'image' } },
            'sunoapi': { name: 'SunoAPI', models: ['music'], types: { music:'audio' } },
            'evolink': { name: 'Evolink.ai', models: ['default'], types: { default:'video' } },
            'aimastering': { name: 'AI Mastering', models: ['mastering'], types: { mastering:'audio' } },
            'deepseek': { name: 'DeepSeek', models: ['chat'], types: { chat:'chat' } },
            'leonardo': { name: 'Leonardo.ai', models: ['image'], types: { image:'image' } },
            'gemini': { name: 'Gemini AI', models: ['chat'], types: { chat:'chat' } },
            'grok': { name: 'Grok AI', models: ['chat'], types: { chat:'chat' } }
        };

        const translations = {
            id: { home:'Beranda', tools:'Tool Model', login:'Login', logout:'Logout', dashboard:'Dashboard', heroTitle:'Kreaverse AI', heroSub:'Platform Agregasi AI Terlengkap', tryNow:'Coba Sekarang', viewServices:'Lihat Layanan', categoryImage:'Gambar', categoryVideo:'Video', categoryAudio:'Audio', categoryChat:'Chat AI', playground:'Playground', inputPrompt:'Prompt', generate:'Generate', result:'Hasil', uploadFile:'Upload File', noResults:'Belum ada hasil', referral:'Kode Undangan' },
            en: { home:'Home', tools:'Tools', login:'Login', logout:'Logout', dashboard:'Dashboard', heroTitle:'Kreaverse AI', heroSub:'Ultimate AI Platform', tryNow:'Try Now', viewServices:'View Services', categoryImage:'Image', categoryVideo:'Video', categoryAudio:'Audio', categoryChat:'Chat AI', playground:'Playground', inputPrompt:'Prompt', generate:'Generate', result:'Result', uploadFile:'Upload File', noResults:'No results', referral:'Referral Code' }
        };
        let currentLang = 'id';
        function t(key) { return translations[currentLang]?.[key] || key; }

        // ========== AUTH ==========
        function isLoggedIn() { return !!localStorage.getItem('token'); }
        function logout() { localStorage.removeItem('token'); window.location.hash = '#/'; location.reload(); }
        async function loginUser(email, password) {
            const res = await fetch('/api/v1/user/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message);
            localStorage.setItem('token', data.data.token);
            return data.data;
        }
        async function apiRequest(url, options = {}) {
            const token = localStorage.getItem('token');
            const headers = { 'Content-Type': 'application/json', ...(token && { Authorization: 'Bearer ' + token }) };
            const res = await fetch(url, { ...options, headers });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message);
            return data;
        }

        // ========== ROUTER ==========
        function renderPage() {
            const hash = window.location.hash || '#/';
            const main = document.getElementById('mainContent');
            updateAuthUI();
            if (!main) return;
            switch (hash) {
                case '#/': renderHome(main); break;
                case '#/tools': renderTools(main); break;
                case '#/playground': renderPlayground(main); break;
                case '#/chat': renderChat(main); break;
                case '#/dashboard': renderDashboard(main); break;
                case '#/login': renderLogin(main); break;
                case '#/register': renderRegister(main); break;
                case '#/pembayaran': renderPembayaran(main); break;
                case '#/tentang': main.innerHTML = '<div class="container"><h2>Tentang</h2></div>'; break;
                case '#/layanan': main.innerHTML = '<div class="container"><h2>Layanan</h2></div>'; break;
                default: renderHome(main);
            }
        }

        function updateAuthUI() {
            const authArea = document.getElementById('authArea');
            if (!authArea) return;
            if (isLoggedIn()) {
                authArea.innerHTML = '<a href="#/dashboard">' + t('dashboard') + '</a> <a href="#" id="logoutLink">' + t('logout') + '</a>';
                document.getElementById('logoutLink')?.addEventListener('click', (e) => { e.preventDefault(); logout(); });
            } else {
                authArea.innerHTML = '<a href="#/login">' + t('login') + '</a>';
            }
        }

        // ========== PAGES ==========
        function renderHome(container) {
            container.innerHTML = '<div class="hero"><h1>' + t('heroTitle') + '</h1><p>' + t('heroSub') + '</p><a href="#/playground" class="btn btn-primary">' + t('tryNow') + '</a> <a href="#/layanan" class="btn btn-outline">' + t('viewServices') + '</a></div>' +
                '<div class="container grid grid-4">' +
                '<a href="#/playground?provider=kie-ai" class="card text-center"><div style="font-size:2rem;">🖼️</div><h3>' + t('categoryImage') + '</h3></a>' +
                '<a href="#/playground?provider=evolink" class="card text-center"><div style="font-size:2rem;">🎥</div><h3>' + t('categoryVideo') + '</h3></a>' +
                '<a href="#/playground?provider=sunoapi" class="card text-center"><div style="font-size:2rem;">🎵</div><h3>' + t('categoryAudio') + '</h3></a>' +
                '<a href="#/playground?provider=deepseek" class="card text-center"><div style="font-size:2rem;">💬</div><h3>' + t('categoryChat') + '</h3></a>' +
                '</div>';
        }

        function renderTools(container) {
            let html = '<div class="container"><h2>' + t('tools') + '</h2><div class="grid grid-3">';
            for (let key in PROVIDER_DATA) {
                html += '<div class="card text-center"><h4>' + PROVIDER_DATA[key].name + '</h4><p>' + PROVIDER_DATA[key].description + '</p><a href="#/playground?provider=' + key + '" class="btn btn-primary btn-sm">Coba</a></div>';
            }
            html += '</div></div>';
            container.innerHTML = html;
        }

        function renderPlayground(container) {
            if (!isLoggedIn()) { window.location.hash = '#/login'; return; }
            let options = '';
            for (let key in PROVIDER_DATA) {
                options += '<option value="' + key + '">' + PROVIDER_DATA[key].name + '</option>';
            }
            container.innerHTML = '<div class="container"><h2>' + t('playground') + '</h2><div class="grid grid-2"><div class="card"><div class="form-group"><label>Provider</label><select id="providerSelect">' + options + '</select></div><div class="form-group"><label>Model</label><select id="modelSelect"></select></div><div class="form-group"><label>' + t('inputPrompt') + '</label><textarea id="promptInput" rows="3"></textarea></div><div class="form-group"><label>' + t('uploadFile') + '</label><input type="file" id="fileInput"></div><button class="btn btn-primary" id="generateBtn">' + t('generate') + '</button><div id="generationStatus"></div></div><div class="card"><h3>' + t('result') + '</h3><div id="resultContainer">' + t('noResults') + '</div></div></div></div>';
            updateModels();
            document.getElementById('providerSelect').addEventListener('change', updateModels);
            document.getElementById('generateBtn').addEventListener('click', generate);
        }

        function updateModels() {
            const provider = document.getElementById('providerSelect').value;
            const models = PROVIDER_DATA[provider].models;
            let opts = '';
            models.forEach(m => opts += '<option value="' + m + '">' + m + '</option>');
            document.getElementById('modelSelect').innerHTML = opts;
        }

        async function generate() {
            const provider = document.getElementById('providerSelect').value;
            const model = document.getElementById('modelSelect').value;
            const prompt = document.getElementById('promptInput').value;
            const input = { prompt: prompt };
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length > 0) {
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                const uploadRes = await fetch('/api/v1/upload/file', {
                    method: 'POST',
                    headers: { Authorization: 'Bearer ' + localStorage.getItem('token') },
                    body: formData
                }).then(r => r.json());
                if (uploadRes.success) input.file_url = uploadRes.data.url;
            }
            document.getElementById('generationStatus').innerHTML = 'Processing...';
            try {
                const res = await apiRequest('/api/v1/jobs/createTask', {
                    method: 'POST',
                    body: JSON.stringify({ provider, model, input, usePersonalKey: false })
                });
                pollTask(res.data.taskId);
            } catch (e) {
                alert(e.message);
            }
        }

        async function pollTask(taskId) {
            const res = await apiRequest('/api/v1/jobs/recordInfo?taskId=' + taskId);
            if (res.data.state === 2) {
                const urls = res.data.resultUrls;
                const container = document.getElementById('resultContainer');
                if (urls && urls.length) {
                    container.innerHTML = urls.map(u => '<img src="' + u + '" style="width:100%;">').join('');
                } else if (res.data.result?.text) {
                    container.innerHTML = '<div style="white-space:pre-wrap;">' + res.data.result.text + '</div>';
                }
                document.getElementById('generationStatus').innerHTML = 'Selesai';
            } else if (res.data.state === 3) {
                document.getElementById('generationStatus').innerHTML = 'Gagal';
            } else {
                setTimeout(() => pollTask(taskId), 2000);
            }
        }

        function renderChat(container) {
            if (!isLoggedIn()) { window.location.hash = '#/login'; return; }
            container.innerHTML = '<div class="container"><h2>Chat AI</h2><div class="card" style="height:60vh; overflow-y:auto;" id="chatMessages"></div><div style="display:flex; gap:0.5rem; margin-top:1rem;"><select id="chatModel"><option value="deepseek">DeepSeek</option><option value="gemini">Gemini</option><option value="grok">Grok</option></select><input type="text" id="chatPrompt" placeholder="Ketik pesan..." style="flex:1;"><button class="btn btn-primary" id="sendChatBtn">Kirim</button></div></div>';
            document.getElementById('sendChatBtn').addEventListener('click', sendChat);
            document.getElementById('chatPrompt').addEventListener('keypress', function(e) { if (e.key === 'Enter') sendChat(); });
        }

        async function sendChat() {
            const model = document.getElementById('chatModel').value;
            const prompt = document.getElementById('chatPrompt').value;
            if (!prompt.trim()) return;
            const msgs = document.getElementById('chatMessages');
            msgs.innerHTML += '<div style="text-align:right; color:var(--neon-blue); margin:0.5rem;">' + prompt + '</div>';
            document.getElementById('chatPrompt').value = '';
            try {
                const res = await apiRequest('/api/v1/jobs/createTask', { method: 'POST', body: JSON.stringify({ provider: model, model: 'chat', input: { prompt }, usePersonalKey: false }) });
                const pollRes = await apiRequest('/api/v1/jobs/recordInfo?taskId=' + res.data.taskId);
                if (pollRes.data.result?.text) {
                    msgs.innerHTML += '<div style="margin:0.5rem;">' + pollRes.data.result.text + '</div>';
                }
                msgs.scrollTop = msgs.scrollHeight;
            } catch (e) { alert(e.message); }
        }

        function renderDashboard(container) {
            if (!isLoggedIn()) { window.location.hash = '#/login'; return; }
            container.innerHTML = '<div class="container"><h2>' + t('dashboard') + '</h2></div>';
        }

        function renderLogin(container) {
            container.innerHTML = '<div class="container" style="max-width:400px; margin:2rem auto;"><h2>' + t('login') + '</h2><div class="card"><div class="form-group"><input id="email" type="email" placeholder="Email"></div><div class="form-group"><input id="password" type="password" placeholder="Password"></div><button class="btn btn-primary" id="loginBtn" style="width:100%;">' + t('login') + '</button><p class="mt-2 text-center">Belum punya akun? <a href="#/register">Daftar</a></p></div></div>';
            document.getElementById('loginBtn').addEventListener('click', async () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                if (!email || !password) { alert('Isi email dan password'); return; }
                try {
                    await loginUser(email, password);
                    window.location.hash = '#/dashboard';
                } catch (e) { alert(e.message); }
            });
        }

        function renderRegister(container) {
            container.innerHTML = '<div class="container" style="max-width:400px; margin:2rem auto;"><h2>Daftar</h2><div class="card"><div class="form-group"><input id="regEmail" type="email" placeholder="Email"></div><div class="form-group"><input id="regPassword" type="password" placeholder="Password"></div><button class="btn btn-primary" id="registerBtn" style="width:100%;">Daftar</button></div></div>';
            document.getElementById('registerBtn').addEventListener('click', async () => {
                const email = document.getElementById('regEmail').value;
                const password = document.getElementById('regPassword').value;
                if (!email || !password) { alert('Isi email dan password'); return; }
                try {
                    await apiRequest('/api/v1/user/register', { method: 'POST', body: JSON.stringify({ email, password }) });
                    alert('Registrasi berhasil! Silakan login.');
                    window.location.hash = '#/login';
                } catch (e) { alert(e.message); }
            });
        }

        function renderPembayaran(container) {
            container.innerHTML = '<div class="container text-center"><h2>Langganan Premium</h2><p>Rp 700.000 / 3 bulan</p></div>';
        }

        // ========== INIT ==========
        window.addEventListener('DOMContentLoaded', function() {
            document.getElementById('hamburger').addEventListener('click', function() {
                document.getElementById('navLinks').classList.toggle('active');
            });
            renderPage();
            window.addEventListener('hashchange', renderPage);
        });
    </script>
</body>
</html>
