<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Kreaverse AI</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>.admin-section { margin:2rem 0; } .table { width:100%; border-collapse:collapse; } .table th,.table td { padding:0.8rem; border-bottom:1px solid var(--border); text-align:left; }</style>
</head>
<body>
  <div class="container">
    <h1>🛡️ Admin Panel</h1>
    <div id="adminLogin"><div class="form-group"><input id="adminEmail" placeholder="Email admin"></div><div class="form-group"><input id="adminPassword" type="password" placeholder="Password"></div><button class="btn btn-primary" onclick="adminLogin()">Login</button></div>
    <div id="adminContent" style="display:none;">
      <div class="admin-section"><h3>👥 Users</h3><div id="userList"></div></div>
      <div class="admin-section"><h3>➕ Buat User</h3><input id="newEmail" placeholder="Email"><input id="newPass" placeholder="Password"><input id="subEnd" type="date"><button onclick="createUser()">Buat</button></div>
      <div class="admin-section"><h3>🔑 API Keys</h3><div id="apiKeysList"></div></div>
      <div class="admin-section"><h3>⚙️ Pengaturan</h3>
        <label>QR Payment URL</label><input id="qrUrl"><br>
        <label>WhatsApp</label><input id="waNum"><br>
        <label>Bank Name</label><input id="bankName"><br>
        <label>Account Number</label><input id="bankAcc"><br>
        <label>Account Holder</label><input id="bankHolder"><br>
        <label>Promo Banner Text</label><input id="promoText"><br>
        <label>Promo Link</label><input id="promoLink"><br>
        <label>Adsense Code</label><textarea id="adsenseCode"></textarea><br>
        <button onclick="saveSettings()">Simpan</button>
      </div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
