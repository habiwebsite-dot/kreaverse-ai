services:
  - type: web
    name: kreaverse-ai
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PROVIDER_API_KEYS
        sync: false
      - key: ADMIN_EMAIL
        value: habistudio.ai@unlimited.com
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        value: ./data/kreaverse.db
      - key: SELF_URL
        sync: false