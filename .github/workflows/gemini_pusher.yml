name: Tarik Kode dari Gemini

on:
  workflow_dispatch:
    inputs:
      gemini_url:
        description: 'Masukkan Link Share Gemini Kamu'
        required: true
        default: 'https://gemini.google.com/share/aa68a6f02c4e'

jobs:
  fetch_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GEMINI_TO_GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Puppeteer di folder terpisah
        run: |
          mkdir temp_puppeteer
          cd temp_puppeteer
          npm init -y > /dev/null
          npm install puppeteer

      - name: Ambil Kode dari Gemini
        env:
          GEMINI_URL: ${{ github.event.inputs.gemini_url }}
        run: node extract-gemini-code.js

      - name: Hapus file sampah
        run: |
          rm -rf temp_puppeteer node_modules package.json package-lock.json
          rm -f extract-gemini-code.js   # opsional, hapus kalau tidak ingin disimpan

      - name: Commit dan Push Otomatis
        run: |
          git config --global user.name "Gemini Pusher Bot"
          git config --global user.email "bot@gemini.local"
          git add .
          git commit -m "✨ Kode dari Gemini Share (otomatis)" || echo "Tidak ada perubahan"
          git push origin HEAD:main
